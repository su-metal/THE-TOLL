<!DOCTYPE html>
<html>
<head>
    <title>THE TOLL Icon Exporter</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 50px; background: #1a1a1a; color: white; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #6a11cb; color: white; border: none; border-radius: 8px; }
        canvas { border: 1px solid #444; margin-top: 20px; background: #333; }
        .info { color: #aaa; text-align: center; }
    </style>
</head>
<body>
    <h1>THE TOLL - Icon PNG Exporter</h1>
    <p class="info">Click the button below to generate and download all required icon sizes (16, 32, 48, 128) as PNG files.</p>
    <button onclick="exportIcons()">🚀 Export All PNGs</button>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const sizes = [16, 32, 48, 128];
        const svgPath = '../chrome-extension/icons/icon_source.svg';

        async function exportIcons() {
            const response = await fetch(svgPath);
            const svgText = await response.text();
            const blob = new Blob([svgText], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);

            for (const size of sizes) {
                const img = new Image();
                img.src = url;
                await new Promise(resolve => img.onload = resolve);

                const canvas = document.getElementById('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0, size, size);

                const pngUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = pngUrl;
                link.click();
                
                // Small delay to ensure browser handles multiple downloads
                await new Promise(r => setTimeout(r, 600));
            }
            URL.revokeObjectURL(url);
            alert('Export complete! Please move the downloaded files to chrome-extension/icons/');
        }
    </script>
</body>
</html>
